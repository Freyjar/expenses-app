<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
  <h1>📊 Dashboard</h1>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <a href="/" style="color:#aaa;font-size:0.85rem;text-decoration:none;padding:6px 12px;background:#1a1a1a;border-radius:8px">+ Add</a>
    <a href="/debts" style="color:#aaa;font-size:0.85rem;text-decoration:none;padding:6px 12px;background:#1a1a1a;border-radius:8px">💸 Debts</a>
    <a href="/calculator" style="color:#aaa;font-size:0.85rem;text-decoration:none;padding:6px 12px;background:#1a1a1a;border-radius:8px">🧮 Calc</a>
    <button class="add-btn" style="font-size:0.8rem;padding:6px 12px;background:#2a2a2a;color:#aaa" onclick="logout()">Logout</button>
  </div>
</div>

<div class="cards" style="grid-template-columns:repeat(2,1fr)">
  <div class="card">
    <div class="card-label">This month</div>
    <div class="card-value" id="monthTotal">₱0</div>
  </div>
  <div class="card">
    <div class="card-label">Last month</div>
    <div class="card-value" id="lastMonth">₱0</div>
  </div>
  <div class="card">
    <div class="card-label">Weekly avg</div>
    <div class="card-value" id="weeklyAvg">₱0</div>
  </div>
  <div class="card">
    <div class="card-label">Top category</div>
    <div class="card-value" id="topCategory">—</div>
  </div>
</div>

<div class="chart-box">
  <h2>This month by category</h2>
  <canvas id="categoryChart" height="160"></canvas>
</div>

<div class="chart-box">
  <h2>Daily spending this month</h2>
  <canvas id="dailyChart" height="160"></canvas>
</div>

<div class="chart-box">
  <h2>This month vs last month</h2>
  <canvas id="compareChart" height="120"></canvas>
</div>

<div class="list-box">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:8px">
    <h2 style="margin:0">Recent expenses</h2>
    <span style="font-size:0.8rem;color:#555" id="expenseCount"></span>
  </div>

  <!-- Search -->
  <input type="text" id="searchInput" placeholder="🔍 Search merchant or note..." 
    style="width:100%;margin-bottom:10px;background:#2a2a2a;border:1px solid #333;border-radius:8px;padding:8px 14px;color:#fff;font-size:0.9rem;outline:none"
    oninput="filterExpenses()" />

  <!-- Category filter pills -->
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px" id="filterPills">
    <span class="cat-pill selected" style="color:#fff;border-color:#fff" data-cat="" onclick="selectFilter(this, '')">All</span>
    <span class="cat-pill" style="color:#f97316" data-cat="food" onclick="selectFilter(this, 'food')">food</span>
    <span class="cat-pill" style="color:#3b82f6" data-cat="transport" onclick="selectFilter(this, 'transport')">transport</span>
    <span class="cat-pill" style="color:#8b5cf6" data-cat="utilities" onclick="selectFilter(this, 'utilities')">utilities</span>
    <span class="cat-pill" style="color:#ec4899" data-cat="shopping" onclick="selectFilter(this, 'shopping')">shopping</span>
    <span class="cat-pill" style="color:#22c55e" data-cat="health" onclick="selectFilter(this, 'health')">health</span>
    <span class="cat-pill" style="color:#eab308" data-cat="entertainment" onclick="selectFilter(this, 'entertainment')">entertainment</span>
    <span class="cat-pill" style="color:#888" data-cat="other" onclick="selectFilter(this, 'other')">other</span>
  </div>

  <div id="expenseList"><div class="loading">Loading...</div></div>
</div>

<script src="/static/app.js"></script>
<script>
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}
loadData();
</script>
</body>
</html>
