<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
  <h1>📊 Dashboard</h1>
  <div style="display:flex;gap:8px">
    <a href="/" style="color:#aaa;font-size:0.85rem;text-decoration:none;padding:6px 12px;background:#1a1a1a;border-radius:8px">← Add</a>
    <button class="add-btn" style="font-size:0.8rem;padding:6px 12px;background:#2a2a2a;color:#aaa" onclick="logout()">Logout</button>
  </div>
</div>

<div class="cards">
  <div class="card">
    <div class="card-label">This month</div>
    <div class="card-value" id="monthTotal">₱0</div>
  </div>
  <div class="card">
    <div class="card-label">Top category</div>
    <div class="card-value" id="topCategory">—</div>
  </div>
  <div class="card">
    <div class="card-label">Entries</div>
    <div class="card-value" id="txCount">0</div>
  </div>
</div>

<div class="chart-box">
  <h2>This month by category</h2>
  <canvas id="categoryChart" height="160"></canvas>
</div>

<div class="list-box">
  <h2>Recent expenses</h2>
  <div id="expenseList"><div class="loading">Loading...</div></div>
</div>

<script src="/static/app.js"></script>
<script>
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}
loadData();
</script>
</body>
</html>
