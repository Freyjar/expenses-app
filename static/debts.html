<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debts</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .tab-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .tab { padding: 8px 18px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: 1.5px solid #333; background: #1a1a1a; color: #aaa; }
    .tab.active { border-color: #fff; color: #fff; }
    .section-title { font-size: 0.85rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin: 1.2rem 0 0.5rem; }
  </style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
  <h1>💸 Debts</h1>
  <div style="display:flex;gap:8px">
    <a href="/dashboard" style="color:#aaa;font-size:0.85rem;text-decoration:none;padding:6px 12px;background:#1a1a1a;border-radius:8px">← Dashboard</a>
    <button class="add-btn" style="font-size:0.8rem;padding:6px 12px;background:#2a2a2a;color:#aaa" onclick="logout()">Logout</button>
  </div>
</div>

<!-- Tabs -->
<div class="tab-row">
  <div class="tab active" id="tab-lent" onclick="switchTab('lent')">💰 I Lent</div>
  <div class="tab" id="tab-owe" onclick="switchTab('owe')">🧾 I Owe</div>
</div>

<!-- Input form -->
<div class="input-box">
  <div class="row">
    <input type="text" id="person" placeholder="Person" style="flex:2" />
    <input type="number" id="debtAmount" placeholder="Amount (₱)" step="0.01" min="0" style="flex:1" />
  </div>
  <div class="row">
    <input type="text" id="debtNote" placeholder="Note (optional)" style="flex:2" />
    <input type="date" id="debtDate" style="flex:1" />
    <button class="add-btn" id="addBtn" onclick="addDebt()">Add</button>
  </div>
  <div class="status" id="status"></div>
</div>

<!-- Summary cards -->
<div class="cards" style="grid-template-columns:repeat(2,1fr)">
  <div class="card">
    <div class="card-label" id="card-label-total">Total others owe me</div>
    <div class="card-value" id="totalOwed">₱0</div>
  </div>
  <div class="card">
    <div class="card-label" id="card-label-count">People</div>
    <div class="card-value" id="totalDebtors">0</div>
  </div>
</div>

<!-- Lists -->
<div class="list-box" style="margin-top:1.5rem">
  <div class="section-title">Outstanding</div>
  <div id="unpaidList"><div class="loading">Loading...</div></div>
  <div class="section-title">Paid / Settled</div>
  <div id="paidList"><div class="loading">Loading...</div></div>
</div>

<script>
async function checkAuth() {
  const res = await fetch('/api/me');
  if (res.status === 401) window.location.href = '/login';
}
checkAuth();

let currentTab = 'lent';
document.getElementById('debtDate').value = new Date().toISOString().split('T')[0];

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-lent').classList.toggle('active', tab === 'lent');
  document.getElementById('tab-owe').classList.toggle('active', tab === 'owe');

  if (tab === 'lent') {
    document.getElementById('person').placeholder = 'Who borrowed from you?';
    document.getElementById('card-label-total').textContent = 'Total others owe me';
    document.getElementById('card-label-count').textContent = 'People';
  } else {
    document.getElementById('person').placeholder = 'Who did you borrow from?';
    document.getElementById('card-label-total').textContent = 'Total I owe';
    document.getElementById('card-label-count').textContent = 'Creditors';
  }
  loadDebts();
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

async function addDebt() {
  const person = document.getElementById('person').value.trim();
  const amount = parseFloat(document.getElementById('debtAmount').value);
  const note = document.getElementById('debtNote').value.trim();
  const date = document.getElementById('debtDate').value;
  const status = document.getElementById('status');

  if (!person || !amount || !date) {
    status.className = 'status err';
    status.textContent = '❌ Please fill in person, amount and date.';
    return;
  }

  await fetch('/api/debts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person, amount, note, date, type: currentTab })
  });

  status.className = 'status ok';
  status.textContent = `✅ ₱${amount} ${currentTab === 'lent' ? 'lent to' : 'borrowed from'} ${person} recorded!`;
  document.getElementById('person').value = '';
  document.getElementById('debtAmount').value = '';
  document.getElementById('debtNote').value = '';
  document.getElementById('debtDate').value = new Date().toISOString().split('T')[0];
  loadDebts();
}

async function updateDebt(id, originalAmount) {
  const newAmount = prompt(`Remaining amount (original: ₱${originalAmount}). Enter 0 if fully settled:`);
  if (newAmount === null) return;
  await fetch(`/api/debts/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ amount: parseFloat(newAmount) })
  });
  loadDebts();
}

async function deleteDebt(id) {
  if (!confirm('Delete this record?')) return;
  await fetch(`/api/debts/${id}`, { method: 'DELETE' });
  loadDebts();
}

async function loadDebts() {
  const debts = await fetch('/api/debts').then(r => r.json());
  const filtered = debts.filter(d => d.type === currentTab);
  const unpaid = filtered.filter(d => d.status === 'unpaid');
  const paid = filtered.filter(d => d.status === 'paid');

  const totalOwed = unpaid.reduce((sum, d) => sum + parseFloat(d.amount), 0);
  document.getElementById('totalOwed').textContent = '₱' + totalOwed.toLocaleString('en-PH', { minimumFractionDigits: 2 });
  document.getElementById('totalDebtors').textContent = unpaid.length;

  const color = currentTab === 'lent' ? '#f97316' : '#ef4444';

  const renderDebt = (d) => `
    <div class="expense-item">
      <div class="expense-left">
        <span class="expense-merchant">${d.person}</span>
        <span class="expense-meta">${d.date}${d.note ? ' · ' + d.note : ''} · original: ₱${Number(d.original_amount).toLocaleString()}</span>
      </div>
      <div class="expense-right">
        <span class="expense-amount" style="color:${d.status === 'paid' ? '#22c55e' : color}">
          ₱${Number(d.amount).toLocaleString()}
        </span>
        ${d.status === 'unpaid' ? `<button class="del-btn" onclick="updateDebt(${d.id}, ${d.original_amount})" title="Update payment">✎</button>` : ''}
        <button class="del-btn" onclick="deleteDebt(${d.id})">✕</button>
      </div>
    </div>
  `;

  document.getElementById('unpaidList').innerHTML = unpaid.length === 0
    ? `<div class="loading">${currentTab === 'lent' ? 'No outstanding debts 🎉' : 'You owe nothing 🎉'}</div>`
    : unpaid.map(renderDebt).join('');

  document.getElementById('paidList').innerHTML = paid.length === 0
    ? '<div class="loading">None yet.</div>'
    : paid.map(renderDebt).join('');
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') addDebt(); });
loadDebts();
</script>
</body>
</html>
