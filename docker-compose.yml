services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: expensesdb
      DB_USER: expenseuser
      DB_PASSWORD: localpassword
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: expensesdb
      POSTGRES_USER: expenseuser
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenseuser -d expensesdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
